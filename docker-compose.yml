services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: shoujiki
      POSTGRES_PASSWORD: shoujiki
      POSTGRES_DB: shoujiki
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis-queue:
    image: redis:7-alpine
    command: redis-server --requirepass shoujiki_v3_secure_redis_2026
    ports:
      - "6379:6379"

  redis-pubsub:
    image: redis:7-alpine
    command: redis-server --requirepass shoujiki_v3_secure_redis_2026
    ports:
      - "6380:6379"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://shoujiki:shoujiki@db:5432/shoujiki
      REDIS_QUEUE_HOST: redis-queue
      REDIS_PUBSUB_HOST: redis-pubsub
      REDIS_PASSWORD: shoujiki
      SANDBOX_URL: http://sandbox:8001
      PYTHONPATH: /app/api
      SECRET_KEY: "shoujiki-secret-key-change-in-production"
    depends_on:
      - db
      - redis-queue
      - redis-pubsub
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: python3 -m arq backend.core.tasks.WorkerSettings
    environment:
      DATABASE_URL: postgresql+asyncpg://shoujiki:shoujiki@db:5432/shoujiki
      REDIS_QUEUE_HOST: redis-queue
      REDIS_PUBSUB_HOST: redis-pubsub
      REDIS_PASSWORD: shoujiki_v3_secure_redis_2026
      SANDBOX_URL: http://sandbox:8001
      PYTHONPATH: /app/api
    depends_on:
      - db
      - redis-queue
      - redis-pubsub

  sandbox:
    build:
      context: ./apps/sandbox
      dockerfile: Dockerfile
    ports:
      - "8001:8001"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: /api
      PORT: 3000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
