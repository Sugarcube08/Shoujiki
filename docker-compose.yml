services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: shoujiki
      POSTGRES_PASSWORD: shoujiki_v3_secure_db_2026
      POSTGRES_DB: shoujiki
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis-queue:
    image: redis:7-alpine
    command: redis-server --requirepass shoujiki_v3_secure_redis_2026
    ports:
      - "6379:6379"

  redis-pubsub:
    image: redis:7-alpine
    command: redis-server --requirepass shoujiki_v3_secure_redis_2026
    ports:
      - "6380:6379"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://shoujiki:shoujiki_v3_secure_db_2026@db:5432/shoujiki
      REDIS_QUEUE_HOST: redis-queue
      REDIS_PUBSUB_HOST: redis-pubsub
      REDIS_PASSWORD: shoujiki_v3_secure_redis_2026
      SANDBOX_URL: http://sandbox:8001
      PYTHONPATH: /app
      SECRET_KEY: "change-this-to-a-secure-random-string-in-production"
      PLATFORM_SECRET_SEED: "shoujiki_platform_secret_seed_32_chars"
      SQUADS_MULTISIG_PDA: "GcUqEvuzyvTPZi38wqtFSvoDwT3yuc8gYCAmCJgyRyG5"
      SOLANA_RPC_URL: "https://api.devnet.solana.com"
    depends_on:
      - db
      - redis-queue
      - redis-pubsub
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: python3 -m arq core.tasks.WorkerSettings
    environment:
      DATABASE_URL: postgresql+asyncpg://shoujiki:shoujiki_v3_secure_db_2026@db:5432/shoujiki
      REDIS_QUEUE_HOST: redis-queue
      REDIS_PUBSUB_HOST: redis-pubsub
      REDIS_PASSWORD: shoujiki_v3_secure_redis_2026
      SANDBOX_URL: http://sandbox:8001
      PYTHONPATH: /app
      PLATFORM_SECRET_SEED: "shoujiki_platform_secret_seed_32_chars"
      SOLANA_RPC_URL: "https://api.devnet.solana.com"
    depends_on:
      - db
      - redis-queue
      - redis-pubsub

  sandbox:
    build:
      context: ./apps/sandbox
      dockerfile: Dockerfile
    environment:
      SANDBOX_STORAGE_PATH: /home/sandboxuser/app/agent_data
    volumes:
      - sandbox_data:/home/sandboxuser/app/agent_data
    cap_add:
      - SYS_ADMIN
    ports:
      - "8001:8001"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: /api
      PORT: 3000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  sandbox_data:
