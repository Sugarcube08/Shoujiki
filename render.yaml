services:
  - type: web
    name: shoujiki-backend
    env: docker
    dockerContext: .
    dockerfilePath: deploy/render-backend/Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shoujiki-db
          property: connectionString
      - key: PORT
        value: "8000"
      - key: PLATFORM_SECRET_SEED
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: SOLANA_RPC_URL
        value: https://api.devnet.solana.com
      - key: NEXT_PUBLIC_API_URL
        value: /api
      - key: SANDBOX_URL
        value: http://localhost:8001
      - key: REDIS_HOST
        value: 127.0.0.1
      - key: PORT
        value: 3000

databases:
  - name: shoujiki-db
    plan: free
    region: oregon
