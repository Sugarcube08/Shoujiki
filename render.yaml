services:
  # 1. Complete System (UI + Backend)
  - type: web
    name: shoujiki-backend
    env: docker
    dockerContext: .
    dockerfilePath: deploy/mono/Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shoujiki-db
          property: connectionString
      - key: PLATFORM_SECRET_SEED
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: SOLANA_RPC_URL
        value: https://api.devnet.solana.com
      - key: NEXT_PUBLIC_API_URL
        value: /api
      - key: SANDBOX_URL
        value: http://localhost:8001
      - key: REDIS_HOST
        value: 127.0.0.1
      - key: PORT
        value: "3000"

  # 2. Synced Backend-Only (API + Sandbox + Worker + Redis)
  - type: web
    name: shoujiki-backend-only
    env: docker
    dockerContext: .
    dockerfilePath: deploy/render-backend/Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shoujiki-db
          property: connectionString
      - key: PLATFORM_SECRET_SEED
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: SOLANA_RPC_URL
        value: https://api.devnet.solana.com
      - key: SANDBOX_URL
        value: http://localhost:8001
      - key: REDIS_HOST
        value: 127.0.0.1
      - key: PORT
        value: "8000"

databases:
  - name: shoujiki-db
    plan: free
    region: oregon
