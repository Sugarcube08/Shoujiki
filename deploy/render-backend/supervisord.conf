[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[program:redis]
command=redis-server --port 6379 --bind 127.0.0.1
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:api]
command=uvicorn backend.main:app --host 0.0.0.0 --port 8000
directory=/app/api
autostart=true
autorestart=true
environment=SANDBOX_URL=http://localhost:8001,PYTHONPATH=/app/api,REDIS_HOST=127.0.0.1
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:worker]
command=arq backend.core.tasks.WorkerSettings
directory=/app/api
autostart=true
autorestart=true
environment=SANDBOX_URL=http://localhost:8001,PYTHONPATH=/app/api,REDIS_HOST=127.0.0.1
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:sandbox]
command=uvicorn app:app --host 0.0.0.0 --port 8001
directory=/app/sandbox
autostart=true
autorestart=true
environment=PYTHONPATH=/app/sandbox
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
