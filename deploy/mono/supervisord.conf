[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:api]
command=uvicorn backend.main:app --host 0.0.0.0 --port 8000
directory=/app/api
autostart=true
autorestart=true
environment=SANDBOX_URL="http://localhost:8001"
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:sandbox]
command=uvicorn app:app --host 0.0.0.0 --port 8001
directory=/app/sandbox
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:web]
command=node web/server.js
directory=/app
autostart=true
autorestart=true
environment=PORT=3000,NEXT_PUBLIC_API_URL="http://localhost:8000"
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
